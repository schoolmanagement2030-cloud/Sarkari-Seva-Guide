name: Deploy Website

on:
  push:
    branches: ["main"]

permissions:
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      # 🔥 CLEAN + SAFE INSTALL (fixes oxide / optional deps issue)
      - name: Install dependencies (clean fix)
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --no-optional

      # 🏗 Build project
      - name: Build project
        run: npm run build

      # 📦 Upload build (Vite default = dist)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
