name: Deploy Website

on:
  push:
    branches: ["main"]

permissions:
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Clean install (fix npm bug)
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./dist

      - name: Deploy
        uses: actions/deploy-pages@v2
