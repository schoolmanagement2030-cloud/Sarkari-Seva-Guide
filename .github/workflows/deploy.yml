name: Deploy Website

on:
  push:
    branches: ["main"]

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      # 🔥 REAL FIX (oxide + rollup + npm bug)
      - name: Clean install (FULL FIX)
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --no-optional --legacy-peer-deps

      # 🏗 Build
      - name: Build
        run: npm run build

      # 📦 Upload
      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
